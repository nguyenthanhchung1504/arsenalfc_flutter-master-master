name: gooner_vietnam
description: Gooner Vietnam — ứng dụng fan Arsenal tại Việt Nam.
publish_to: 'none'

version: 5.0.0+19

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State (GetX còn chạy song song đến hết Phase 3; Riverpod là chính từ Phase 2)
  get: ^4.7.2
  flutter_riverpod: ^2.6.1

  # Codegen models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Config
  flutter_dotenv: ^5.2.1

  # Network & storage
  dio: ^5.9.0
  http: ^1.5.0
  get_storage: ^2.1.1
  connectivity_plus: ^6.1.4

  # Firebase (aligned versions — chạy `flutterfire configure` sau khi tạo project)
  firebase_core: ^3.8.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.2
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4
  firebase_crashlytics: ^4.3.4

  # UI & media
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^1.2.1
  pageviewj: any
  collection: any
  webview_flutter: ^4.13.0
  pod_player: ^0.2.2
  flutter_easyloading: ^3.0.5
  fluttertoast: ^8.2.14
  flutter_local_notifications: ^18.0.1

  # Platform
  google_mobile_ads: ^6.0.0
  rate_my_app: ^2.3.2
  share_plus: ^12.0.1
  image_picker: ^1.2.0
  permission_handler: ^12.0.1
  uuid: ^4.5.1
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/json/

  fonts:
    - family: montserrat_black
      fonts:
        - asset: assets/fonts/montserrat_black.ttf
          weight: 700
        - asset: assets/fonts/montserrat_light.ttf
          weight: 400
